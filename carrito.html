<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito y pago — DAVFOOR LEGEND</title>
<style>
  :root{
    --bg:#0a0a0a; --panel:#151515; --panel2:#1d1d1d; --line:#282828;
    --green:#3fe167; --green-d:#25a544; --txt:#ffffff; --muted:#9aa0a6;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;line-height:1.45;overflow-x:hidden}
  img{max-width:100%;display:block}
  a{color:inherit}
  .wrap{max-width:480px;margin:0 auto;position:relative;min-height:100vh;background:var(--bg);box-shadow:0 0 40px rgba(0,0,0,.6);padding-bottom:120px}

  header{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;
    padding:12px 14px;background:rgba(10,10,10,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .icon-btn{background:none;border:none;color:var(--txt);cursor:pointer;padding:6px;display:flex}
  .icon-btn svg{width:25px;height:25px}
  .logo-top{height:30px}
  h-title{}
  .demo-flag{background:#e8a33d;color:#2a1900;text-align:center;font-size:11px;font-weight:800;padding:7px;letter-spacing:.4px}

  .step{padding:18px 16px 4px}
  .step h2{font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:9px;margin-bottom:14px}
  .step h2 .n{width:24px;height:24px;border-radius:50%;background:var(--green);color:#04240f;font-size:13px;display:flex;align-items:center;justify-content:center;font-weight:900}

  /* CARRITO */
  .item{display:flex;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:11px;margin-bottom:11px}
  .item .pic{width:66px;height:66px;border-radius:10px;background:radial-gradient(120% 120% at 50% 20%,#262626,#111);flex:0 0 auto;display:flex;align-items:center;justify-content:center}
  .item .pic svg{width:78%;height:78%}
  .item .d{flex:1;min-width:0}
  .item .d .t{font-weight:800;font-size:13.5px}
  .item .d .sub{font-size:11.5px;color:var(--muted);margin:2px 0 6px}
  .item .d .sub b{color:#cfcfcf}
  .item .d .pr{color:var(--green);font-weight:900;font-size:14px}
  .item .qty{display:flex;align-items:center;gap:8px;margin-top:7px}
  .item .qty button{width:24px;height:24px;border-radius:7px;border:1px solid var(--line);background:#0e0e0e;color:#fff;font-weight:800;cursor:pointer}
  .item .qty span{font-size:13px;font-weight:800;min-width:16px;text-align:center}
  .item .rm{background:none;border:none;color:#ff6b6b;font-size:11px;cursor:pointer;padding:4px 0}

  /* FORMS */
  .field{margin-bottom:13px}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;font-weight:700}
  .field input,.field select,.field textarea{width:100%;background:#0e0e0e;border:1px solid var(--line);border-radius:11px;padding:13px;color:#fff;font-size:14.5px}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green)}
  .field.err input{border-color:#ff6b6b}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .chk{display:flex;align-items:center;gap:9px;font-size:13px;color:#cfcfcf;margin:2px 0 6px;cursor:pointer}
  .chk input{width:18px;height:18px;accent-color:var(--green)}

  /* PAGO */
  .pay{display:block;background:var(--panel);border:2px solid var(--line);border-radius:14px;padding:14px;margin-bottom:11px;cursor:pointer;transition:.12s}
  .pay.sel{border-color:var(--green);background:rgba(63,225,103,.07)}
  .pay .top{display:flex;align-items:center;gap:11px}
  .pay .radio{width:20px;height:20px;border-radius:50%;border:2px solid #555;flex:0 0 auto;position:relative}
  .pay.sel .radio{border-color:var(--green)}
  .pay.sel .radio:after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--green)}
  .pay .ttl{font-weight:800;font-size:14px}
  .pay .ico{margin-left:auto;font-size:20px}
  .pay .desc{font-size:12px;color:var(--muted);margin-top:8px;padding-left:31px}
  .pay .desc b{color:var(--green)}

  /* RESUMEN */
  .summary{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px;margin:4px 16px 0}
  .summary .l{display:flex;justify-content:space-between;font-size:13.5px;padding:6px 0;color:#cfcfcf}
  .summary .l.free{color:var(--green);font-weight:700}
  .summary .divider{height:1px;background:var(--line);margin:8px 0}
  .summary .l.total{font-size:16px;font-weight:900;color:#fff}
  .summary .l.total b{color:var(--green)}
  .summary .now{background:rgba(63,225,103,.1);border:1px solid rgba(63,225,103,.35);border-radius:10px;padding:10px 12px;margin-top:11px;font-size:12.5px}
  .summary .now .big{font-size:17px;font-weight:900;color:var(--green)}
  .ship-hint{font-size:11.5px;color:#e8a33d;margin-top:8px;text-align:center}

  .secure{display:flex;align-items:center;gap:8px;justify-content:center;color:var(--muted);font-size:11.5px;padding:16px}
  .secure svg{width:15px;height:15px;fill:var(--green)}

  /* BARRA FIJA */
  .paybar{position:fixed;bottom:0;left:0;right:0;z-index:44;max-width:480px;margin:0 auto;
     background:rgba(14,14,14,.97);backdrop-filter:blur(10px);border-top:1px solid var(--line);
     padding:12px 16px calc(12px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:12px}
  .paybar .tot{flex:0 0 auto}
  .paybar .tot small{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .paybar .tot b{font-size:18px;color:#fff}
  .btn-pay{flex:1;background:var(--green);color:#04240f;font-weight:900;border:none;border-radius:14px;padding:15px;font-size:14.5px;cursor:pointer;text-transform:uppercase;letter-spacing:.3px}
  .btn-pay:active{transform:scale(.98)}

  /* OVERLAY MERCADO PAGO / CONFIRMACIÓN */
  .modal{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.75);display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:0}
  .modal.open{display:flex}
  .sheet{max-width:480px;width:100%;min-height:100vh;background:var(--bg)}
  .mp-load{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:30px;gap:16px}
  .mp-load .spin{width:52px;height:52px;border:5px solid #222;border-top-color:#009ee3;border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .mp-badge{background:#009ee3;color:#fff;font-weight:800;padding:8px 16px;border-radius:8px;font-size:14px}

  .ok-head{background:linear-gradient(160deg,#123a1f,#0a0a0a);padding:34px 20px 26px;text-align:center;border-bottom:1px solid var(--line)}
  .ok-head .check{width:64px;height:64px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
  .ok-head .check svg{width:34px;height:34px;stroke:#04240f;stroke-width:3.5;fill:none}
  .ok-head h3{font-size:20px;font-weight:900}
  .ok-head p{color:var(--muted);font-size:13px;margin-top:5px}
  .ok-head .num{display:inline-block;margin-top:12px;background:#000;border:1px solid var(--line);border-radius:8px;padding:7px 14px;font-weight:800;letter-spacing:1px}

  .msg-card{margin:16px;border-radius:16px;overflow:hidden;border:1px solid var(--line)}
  .msg-card .head{display:flex;align-items:center;gap:9px;padding:11px 14px;font-weight:800;font-size:13px}
  .msg-card.wa .head{background:#075e54}
  .msg-card.mail .head{background:#2b2b2b}
  .msg-card .head .i{font-size:17px}
  .bubble{background:#dcf8c6;color:#111;margin:12px;padding:12px 13px;border-radius:12px 12px 12px 4px;font-size:12.5px;line-height:1.5;position:relative}
  .mailbody{background:#fff;color:#111;margin:0;padding:16px;font-size:12.5px;line-height:1.55}
  .mailbody .row{display:flex;justify-content:space-between;border-bottom:1px solid #eee;padding:5px 0}
  .mailbody .guide{background:#eef7ff;border:1px dashed #009ee3;border-radius:8px;padding:10px;margin-top:12px;text-align:center;font-weight:800;color:#0a6ebd}

  /* TIMELINE */
  .track{margin:8px 16px 20px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 16px}
  .track h4{font-size:13px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}
  .tl{position:relative;padding-left:30px}
  .tl:before{content:"";position:absolute;left:9px;top:4px;bottom:4px;width:2px;background:var(--line)}
  .tl .s{position:relative;padding-bottom:18px}
  .tl .s:last-child{padding-bottom:0}
  .tl .s .dot{position:absolute;left:-30px;top:0;width:20px;height:20px;border-radius:50%;background:#222;border:2px solid #333;display:flex;align-items:center;justify-content:center;font-size:10px}
  .tl .s.done .dot{background:var(--green);border-color:var(--green);color:#04240f}
  .tl .s.active .dot{background:#e8a33d;border-color:#e8a33d}
  .tl .s .t{font-weight:800;font-size:13.5px}
  .tl .s .sub{font-size:11.5px;color:var(--muted)}
  .tl .s.pending .t{color:var(--muted)}

  .btn-ghost{display:block;margin:6px 16px 30px;text-align:center;background:none;border:1px solid var(--line);color:#fff;border-radius:12px;padding:13px;font-weight:800;cursor:pointer;width:calc(100% - 32px)}

  /* ---------- VERSIÓN PC / ESCRITORIO ---------- */
  @media(min-width:760px){
    .wrap{max-width:820px;box-shadow:none}
    .paybar{max-width:820px}
    .sheet{max-width:820px}
  }
</style>
</head>
<body>
<div class="wrap">
  

  <header>
    <button class="icon-btn" aria-label="Volver" onclick="location.href='index.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <img class="logo-top" src="assets/img/logo-white.png" alt="DAVFOOR LEGEND">
    <span style="width:36px"></span>
  </header>

  <!-- 1. CARRITO -->
  <div class="step">
    <h2><span class="n">1</span> Tu carrito</h2>
    <div id="cartList"></div>
  </div>

  <!-- 2. ENVÍO -->
  <div class="step">
    <h2><span class="n">2</span> Datos de envío</h2>
    <div class="field"><label>Nombre completo</label><input id="f_nombre" placeholder="Nombre y apellido"></div>
    <div class="row2">
      <div class="field"><label>Cédula</label><input id="f_cedula" inputmode="numeric" placeholder="Cédula"></div>
      <div class="field"><label>Celular (WhatsApp)</label><input id="f_cel" inputmode="numeric" placeholder="300 000 0000"></div>
    </div>
    <div class="field"><label>Correo electrónico</label><input id="f_correo" type="email" placeholder="tucorreo@correo.com"></div>
    <div class="row2">
      <div class="field"><label>Departamento</label><input id="f_depto" placeholder="Ej: Antioquia"></div>
      <div class="field"><label>Ciudad</label><input id="f_ciudad" placeholder="Ej: Medellín"></div>
    </div>
    <div class="field"><label>Dirección</label><input id="f_dir" placeholder="Calle, carrera, # y barrio"></div>
    <div class="field"><label>Notas para el envío (opcional)</label><textarea id="f_notas" rows="2" placeholder="Ej: apartamento, portería, horario"></textarea></div>
  </div>

  <!-- 3. FACTURACIÓN -->
  <div class="step">
    <h2><span class="n">3</span> Facturación</h2>
    <label class="chk"><input type="checkbox" id="f_igual" checked> Facturar con los mismos datos de envío</label>
    <div id="facturaExtra" style="display:none">
      <div class="field"><label>Nombre / Razón social</label><input id="f_fnombre" placeholder="Nombre para la factura"></div>
      <div class="field"><label>NIT o Cédula</label><input id="f_fnit" placeholder="NIT / Cédula"></div>
    </div>
  </div>

  <!-- 4. PAGO -->
  <div class="step">
    <h2><span class="n">4</span> Forma de pago</h2>

    <label class="pay sel" id="pay_contado" onclick="setPago('contado')">
      <div class="top"><span class="radio"></span><span class="ttl">Pago de contado</span><span class="ico">💳</span></div>
      <div class="desc">Pagas el <b>total</b> ahora de forma segura en <b>Mercado Pago</b> (tarjeta, PSE, Nequi...). Tus datos de pago nunca pasan por nuestra página.</div>
    </label>

    <label class="pay" id="pay_contra" onclick="setPago('contra')">
      <div class="top"><span class="radio"></span><span class="ttl">Contra entrega</span><span class="ico">📦</span></div>
      <div class="desc">Pagas <b>$30.000 de anticipo</b> ahora (por Mercado Pago) para asegurar tu pedido, y el <b>resto al recibir</b>. El anticipo cubre el flete en caso de devolución.</div>
    </label>

    <label class="pay" id="pay_addi" onclick="setPago('addi')">
      <div class="top"><span class="radio"></span><span class="ttl">Paga a cuotas con Addi</span><span class="ico">🟣</span></div>
      <div class="desc">Financia tu compra con <b>Addi</b> y págala en cuotas. Aprobación rápida desde tu celular.</div>
    </label>
  </div>

  <!-- RESUMEN -->
  <div class="summary">
    <div class="l"><span>Subtotal productos</span><span id="s_sub">$0</span></div>
    <div class="l" id="s_fee_row" style="display:none"><span>Recargo Addi (10%)</span><span id="s_fee">$0</span></div>
    <div class="l" id="s_ship_row"><span>Envío</span><span id="s_ship">$0</span></div>
    <div class="divider"></div>
    <div class="l total"><span>Total del pedido</span><b id="s_total">$0</b></div>
    <div class="now" id="s_now">
      <span id="s_now_label">Pagas ahora:</span> <span class="big" id="s_paynow">$0</span>
      <div id="s_rest" style="color:var(--muted);margin-top:3px"></div>
    </div>
    <div class="ship-hint" id="s_hint"></div>
  </div>

  <div class="secure">
    <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V5l-9-4zm0 10.9h7c-.5 4.1-3.3 7.8-7 8.9V12H5V6.3l7-3.1v8.7z"/></svg>
    Pago 100% seguro · No guardamos datos de tu tarjeta
  </div>
</div>

<!-- BARRA DE PAGO -->
<div class="paybar">
  <div class="tot"><small id="bar_label">Pagas ahora</small><b id="bar_now">$0</b></div>
  <button class="btn-pay" onclick="pagar()">Ir a pagar →</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-config.js"></script>
<script>
  const fmt = n => '$'+n.toLocaleString('es-CO');
  // Conexión a Supabase (si está configurada) para guardar el pedido
  const _sb = (typeof supabase!=='undefined' && typeof SUPABASE_URL!=='undefined' && !SUPABASE_URL.includes('TU-PROYECTO'))
    ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
  const ENVIO = 18000, GRATIS_DESDE = 300000, ANTICIPO = 30000;

  // ---- Carrito demo ----
  let cart = [
    {team:'Real Madrid', season:'Local 2024/25', tipo:'actual', talla:'L', perso:'BELLINGHAM #5', base:110000, extra:15000, qty:1, c1:'#ffffff', c2:'#00529f'},
    {team:'Boca Juniors', season:'Retro 1981', tipo:'retro', talla:'M', perso:'', base:130000, extra:0, qty:1, c1:'#0a3d91', c2:'#ffd100'},
    {team:'Botilito personalizado', season:'Diseño Real Madrid + nombre', tipo:'accesorio', talla:'Único', perso:'JAMES', base:50000, extra:15000, qty:1, c1:'#1d1d1d', c2:'#3fe167'},
  ];
  let metodo='contado';

  function jersey(c1,c2){return `<svg viewBox="0 0 120 120"><path d="M42 14 L16 26 L8 48 L26 57 L34 50 L34 106 L86 106 L86 50 L94 57 L112 48 L104 26 L78 14 C74 25 66 30 60 30 C54 30 46 25 42 14 Z" fill="${c1}" stroke="#00000030" stroke-width="1.5"/><path d="M42 14 C46 25 54 30 60 30 C66 30 74 25 78 14 L72 11 C68 20 52 20 48 11 Z" fill="${c2}"/></svg>`;}
  const itemPrice = it => (it.base + it.extra) * it.qty;

  function renderCart(){
    document.getElementById('cartList').innerHTML = cart.map((it,i)=>`
      <div class="item">
        <div class="pic">${it.tipo==='accesorio' ? '<div style="font-size:30px">'+(it.team.toLowerCase().includes('gorra')?'🧢':'🥤')+'</div>' : jersey(it.c1,it.c2)}</div>
        <div class="d">
          <div class="t">${it.team}</div>
          <div class="sub">${it.season} · Talla <b>${it.talla}</b>${it.perso?` · <b>${it.perso}</b>`:''}${it.extra?' · +personalización':''}</div>
          <div class="pr">${fmt(itemPrice(it))}</div>
          <div class="qty">
            <button onclick="chq(${i},-1)">−</button><span>${it.qty}</span><button onclick="chq(${i},1)">+</button>
            <button class="rm" onclick="rm(${i})" style="margin-left:10px">Quitar</button>
          </div>
        </div>
      </div>`).join('') || '<div style="color:var(--muted);text-align:center;padding:20px">Tu carrito está vacío</div>';
    calc();
  }
  function chq(i,d){cart[i].qty=Math.max(1,cart[i].qty+d);renderCart();}
  function rm(i){cart.splice(i,1);renderCart();}

  function setPago(m){
    metodo=m;
    ['contado','contra','addi'].forEach(x=>document.getElementById('pay_'+x).classList.toggle('sel',x===m));
    calc();
  }

  function totals(){
    const sub = cart.reduce((a,it)=>a+itemPrice(it),0);
    // Envío $18.000 SOLO si el pago es de contado y la compra no supera $300.000.
    // Contra entrega y Addi: el envío se paga en la entrega con Interrapidísimo.
    const envio = (metodo==='contado' && cart.length && sub < GRATIS_DESDE) ? ENVIO : 0;
    // Addi: recarga el 10% sobre el valor de la compra
    const fee = (metodo==='addi' && cart.length) ? Math.round(sub*0.10) : 0;
    const total = sub + envio + fee;
    // "ahora" = monto que se procesa en el checkout (lo que muestra la barra)
    let ahora = total;                           // contado: total
    if(metodo==='contra') ahora = ANTICIPO;      // contra: solo anticipo (resto + envío en la entrega)
    // addi: se financia el total (sub + 10%) a través de Addi
    return {sub,envio,fee,total,ahora};
  }

  function calc(){
    const {sub,envio,fee,total,ahora}=totals();
    document.getElementById('s_sub').textContent=fmt(sub);

    // Recargo Addi (10%) — solo visible con Addi
    const feeRow=document.getElementById('s_fee_row');
    feeRow.style.display = fee>0 ? 'flex' : 'none';
    if(fee>0) document.getElementById('s_fee').textContent=fmt(fee);

    // Etiqueta de envío según el método de pago
    let shipTxt, shipFree=false;
    if(metodo==='contado'){
      if(envio>0){ shipTxt=fmt(envio); }
      else { shipTxt='¡GRATIS!'; shipFree=true; }
    } else {
      shipTxt='En la entrega (Interrapidísimo)';   // contra entrega / Addi
    }
    document.getElementById('s_ship').textContent = shipTxt;
    document.getElementById('s_ship_row').classList.toggle('free',shipFree);

    document.getElementById('s_total').textContent=fmt(total);
    document.getElementById('s_paynow').textContent=fmt(ahora);
    document.getElementById('bar_now').textContent=fmt(ahora);

    // Etiqueta del monto según el método (para que nunca quede en $0)
    let label = 'Pagas ahora';
    if(metodo==='contra') label = 'Anticipo ahora';
    if(metodo==='addi')   label = 'Financias con Addi';
    document.getElementById('bar_label').textContent = label;
    document.getElementById('s_now_label').textContent = label + ':';

    let rest='';
    if(metodo==='contado') rest = `Incluye todo tu pedido.`;
    if(metodo==='contra')  rest = `Pagas al recibir: <b style="color:#fff">${fmt(sub-ANTICIPO)}</b> + el envío con Interrapidísimo.`;
    if(metodo==='addi')    rest = `Incluye el recargo del 10%. Lo pagas en cuotas con Addi. El envío se paga al recibir con Interrapidísimo.`;
    document.getElementById('s_rest').innerHTML=rest;

    const falta = GRATIS_DESDE - sub;
    document.getElementById('s_hint').textContent = (metodo==='contado' && envio>0 && falta>0) ? `🚚 Te faltan ${fmt(falta)} para envío gratis` : '';
  }

  // facturación distinta
  document.getElementById('f_igual').addEventListener('change',e=>{
    document.getElementById('facturaExtra').style.display = e.target.checked?'none':'block';
  });

  // ---- PAGAR ----
  function pagar(){
    const req=['f_nombre','f_cedula','f_cel','f_correo','f_depto','f_ciudad','f_dir'];
    let ok=true, first=null;
    req.forEach(id=>{
      const el=document.getElementById(id);
      const bad=!el.value.trim();
      el.closest('.field').classList.toggle('err',bad);
      if(bad&&!first){first=el;} if(bad)ok=false;
    });
    if(!ok){first.scrollIntoView({behavior:'smooth',block:'center'});first.focus();return;}
    if(!cart.length){alert('Tu carrito está vacío');return;}
    irAPagar();
  }
  async function irAPagar(){
    await guardarPedido();   // guarda el pedido en la base de datos primero
    mercadoPago();
  }

  // Guarda el pedido en Supabase (aparece en la página de Pedidos)
  async function guardarPedido(){
    if(!_sb) return;      // si no hay Supabase configurado, no hace nada
    const {sub,envio,total}=totals();
    const items = cart.map(it=>({
      team: it.team + (it.perso?(' ('+it.perso+')'):''),
      talla: it.talla || '',
      cant: it.qty || 1,
      precio: (it.base+it.extra)
    }));
    const pedido = {
      cliente: document.getElementById('f_nombre').value.trim(),
      cedula: document.getElementById('f_cedula').value.trim(),
      celular: document.getElementById('f_cel').value.trim(),
      correo: document.getElementById('f_correo').value.trim(),
      departamento: document.getElementById('f_depto').value.trim(),
      ciudad: document.getElementById('f_ciudad').value.trim(),
      direccion: document.getElementById('f_dir').value.trim(),
      notas: (document.getElementById('f_notas')?document.getElementById('f_notas').value.trim():''),
      items, subtotal: sub, envio, total,
      metodo, pago: 'pendiente', estado: 'Nuevo'
    };
    try { await _sb.from('pedidos').insert(pedido); } catch(e){ /* no bloquea la compra */ }
  }

  async function mercadoPago(){
    const m=document.getElementById('modal');m.classList.add('open');window.scrollTo(0,0);
    const {sub,envio,total,ahora}=totals();
    const nota = metodo==='addi' ? 'Preparando pago con Addi…' : 'Redirigiendo a Mercado Pago…';
    document.getElementById('sheet').innerHTML=`
      <div class="mp-load">
        <div class="spin"></div>
        <div class="mp-badge">${metodo==='addi'?'addi':'Mercado Pago'}</div>
        <div style="color:var(--muted);font-size:13px">${nota}<br>Pago seguro por ${fmt(ahora)}</div>
      </div>`;
    // Addi todavía no está integrado -> confirmación (se coordina el pago aparte)
    if(metodo==='addi'){ setTimeout(confirmacion,2200); return; }
    // Arma los productos a cobrar AHORA
    let items;
    if(metodo==='contra'){
      items=[{title:'Anticipo contra entrega · DAVFOOR LEGEND', quantity:1, unit_price:ANTICIPO}];
    } else {
      items = cart.map(it=>({title:it.team, quantity:it.qty, unit_price:(it.base+it.extra)}));
      if(envio>0) items.push({title:'Envío', quantity:1, unit_price:envio});
    }
    const payer={
      nombre:document.getElementById('f_nombre').value.trim(),
      correo:document.getElementById('f_correo').value.trim(),
      celular:document.getElementById('f_cel').value.trim()
    };
    try{
      const r=await fetch('/api/crear-preferencia',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items,payer,metodo})});
      const data=await r.json();
      if(r.ok && data.init_point){ window.location.href=data.init_point; return; }  // ¡a Mercado Pago real!
      throw new Error('sin init_point');
    }catch(e){
      // Si aún NO has puesto tu clave de Mercado Pago en Vercel, mostramos la confirmación de demostración
      setTimeout(confirmacion,1200);
    }
  }

  function confirmacion(){
    const {sub,envio,fee,total,ahora}=totals();
    const orden='DAV-'+Math.floor(100000+Math.random()*899999);
    const guia='CO'+Math.floor(100000000+Math.random()*899999999);
    const nombre=document.getElementById('f_nombre').value||'Cliente';
    const cel=document.getElementById('f_cel').value||'—';
    const correo=document.getElementById('f_correo').value||'—';
    const ciudad=document.getElementById('f_ciudad').value||'—';
    const metodoTxt = metodo==='contado'?'Pago de contado':(metodo==='contra'?'Contra entrega (anticipo pagado)':'Addi (a cuotas)');
    const items = cart.map(it=>`• ${it.team} - Talla ${it.talla}${it.perso?' ('+it.perso+')':''} x${it.qty} — ${fmt(itemPrice(it))}`).join('<br>');
    const feeRow = fee>0 ? `<div class="row"><span>Recargo Addi (10%)</span><span>${fmt(fee)}</span></div>` : '';
    const envioTxt = metodo==='contado' ? (envio===0?'GRATIS':fmt(envio)) : 'En la entrega (Interrapidísimo)';
    let restTxt;
    if(metodo==='contra'){
      restTxt = `<div class="row"><span><b>Pagado ahora (anticipo)</b></span><span><b>${fmt(ANTICIPO)}</b></span></div><div class="row"><span>Pagas al recibir</span><span>${fmt(sub-ANTICIPO)} + envío</span></div>`;
    } else if(metodo==='addi'){
      restTxt = `<div class="row"><span><b>Financiado con Addi</b></span><span><b>${fmt(total)}</b></span></div><div class="row"><span>Envío</span><span>Al recibir (Interrapidísimo)</span></div>`;
    } else {
      restTxt = `<div class="row"><span><b>Pagado</b></span><span><b>${fmt(ahora)}</b></span></div>`;
    }

    document.getElementById('sheet').innerHTML=`
      <div class="ok-head">
        <div class="check"><svg viewBox="0 0 24 24"><path d="M4 12l5 5L20 6"/></svg></div>
        <h3>¡Pedido confirmado!</h3>
        <p>Gracias ${nombre.split(' ')[0]}, ya estamos preparando tu pedido.</p>
        <div class="num">Orden ${orden}</div>
      </div>

      <!-- Mensaje WhatsApp -->
      <div class="msg-card wa">
        <div class="head"><span class="i">🟢</span> Mensaje enviado a tu WhatsApp (${cel})</div>
        <div class="bubble">
          <b>DAVFOOR LEGEND ⚽</b><br>
          ¡Hola ${nombre.split(' ')[0]}! Recibimos tu pedido <b>${orden}</b> ✅<br><br>
          ${items}<br><br>
          <b>Método:</b> ${metodoTxt}<br>
          <b>Total pedido:</b> ${fmt(total)}<br>
          Te avisaremos por aquí cada vez que cambie el estado de tu pedido. 📦
        </div>
      </div>

      <!-- Correo -->
      <div class="msg-card mail">
        <div class="head"><span class="i">✉️</span> Correo enviado a ${correo}</div>
        <div class="mailbody">
          <div style="font-weight:800;margin-bottom:8px">Confirmación de compra — Orden ${orden}</div>
          <div class="row"><span>Cliente</span><span>${nombre}</span></div>
          <div class="row"><span>Envío a</span><span>${ciudad}</span></div>
          <div class="row"><span>Subtotal</span><span>${fmt(sub)}</span></div>
          ${feeRow}
          <div class="row"><span>Envío</span><span>${envioTxt}</span></div>
          ${restTxt}
          <div class="guide">📮 Guía de rastreo: ${guia}<br><span style="font-weight:600;color:#333;font-size:11px">Te la enviamos automáticamente cuando el pedido salga a despacho</span></div>
        </div>
      </div>

      <!-- Seguimiento -->
      <div class="track">
        <h4>📍 Estado de tu pedido</h4>
        <div class="tl">
          <div class="s done"><div class="dot">✓</div><div class="t">Pedido confirmado</div><div class="sub">Hoy · Pago recibido</div></div>
          <div class="s active"><div class="dot"></div><div class="t">En preparación</div><div class="sub">Estamos alistando y empacando tu camiseta</div></div>
          <div class="s pending"><div class="dot"></div><div class="t">Enviado</div><div class="sub">Te llegará la guía ${guia} por WhatsApp y correo</div></div>
          <div class="s pending"><div class="dot"></div><div class="t">Entregado</div><div class="sub">¡A disfrutar tu camiseta!</div></div>
        </div>
      </div>

      <button class="btn-ghost" onclick="document.getElementById('modal').classList.remove('open')">Volver a la tienda</button>
    `;
  }

  renderCart(); setPago('contado');
</script>
</body>
</html>
