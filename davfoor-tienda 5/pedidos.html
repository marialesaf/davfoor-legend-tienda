<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos — DAVFOOR LEGEND (Privado)</title>
<style>
  :root{--bg:#0a0a0a;--panel:#151515;--panel2:#1d1d1d;--line:#282828;--green:#3fe167;--amber:#e8a33d;--red:#ff6b6b;--txt:#fff;--muted:#9aa0a6}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;line-height:1.4}
  .wrap{max-width:820px;margin:0 auto;padding-bottom:50px}
  input,select,button{font-family:inherit}
  header{position:sticky;top:0;z-index:30;background:rgba(10,10,10,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:12px 16px}
  header img{height:30px}
  header .badge{background:rgba(63,225,103,.14);color:var(--green);font-size:11px;font-weight:800;padding:5px 10px;border-radius:20px;border:1px solid rgba(63,225,103,.35);text-transform:uppercase;letter-spacing:.5px}
  header .out{margin-left:auto;background:none;border:1px solid var(--line);color:#fff;border-radius:9px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;display:none}

  .warn{margin:16px;background:rgba(232,163,61,.1);border:1px solid rgba(232,163,61,.4);border-radius:12px;padding:14px;font-size:13px;color:#e9c88a;line-height:1.6}

  /* LOGIN */
  .login{max-width:360px;margin:8vh auto;padding:26px 22px;background:var(--panel);border:1px solid var(--line);border-radius:18px;text-align:center}
  .login img{height:44px;margin:0 auto 14px}
  .login h1{font-size:18px;margin-bottom:4px}
  .login p{color:var(--muted);font-size:13px;margin-bottom:18px}
  .login input{width:100%;background:#0e0e0e;border:1px solid var(--line);border-radius:11px;padding:13px;color:#fff;font-size:14px;margin-bottom:11px}
  .login input:focus{outline:none;border-color:var(--green)}
  .login button{width:100%;background:var(--green);color:#04240f;border:none;border-radius:12px;padding:14px;font-weight:900;font-size:14px;cursor:pointer;text-transform:uppercase;letter-spacing:.4px}
  .login .err{color:var(--red);font-size:12.5px;margin-top:10px;min-height:16px}

  /* TOOLBAR */
  .toolbar{padding:14px 16px 4px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
  .toolbar::-webkit-scrollbar{display:none}
  .fchip{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:8px 14px;font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer}
  .fchip.active{background:var(--green);color:#04240f;border-color:var(--green)}
  .subbar{padding:6px 18px 0;color:var(--muted);font-size:12px}

  /* PEDIDO */
  .list{padding:10px 16px}
  .order{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:14px}
  .o-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .o-id{font-weight:900;font-size:15px}
  .o-date{color:var(--muted);font-size:12px}
  .pill{font-size:10px;font-weight:800;padding:4px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}
  .pay-pagado{background:rgba(63,225,103,.16);color:var(--green)}
  .pay-pendiente{background:rgba(232,163,61,.16);color:var(--amber)}
  .pay-rechazado{background:rgba(255,107,107,.16);color:var(--red)}
  .st{margin-left:auto}
  .st-Nuevo{background:rgba(108,171,221,.18);color:#8fc5ef}
  .st-Enpreparación{background:rgba(232,163,61,.16);color:var(--amber)}
  .st-Enviado{background:rgba(63,225,103,.16);color:var(--green)}
  .st-Entregado{background:rgba(150,150,150,.18);color:#c9c9c9}
  .o-row{font-size:13px;color:#cfcfcf;padding:3px 0}
  .o-row b{color:#fff}
  .items{background:#0e0e0e;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:10px 0;font-size:13px}
  .items div{padding:3px 0;border-bottom:1px solid #1c1c1c}
  .items div:last-child{border-bottom:none}
  .o-total{font-size:16px;font-weight:900;color:var(--green);margin-top:6px}
  .contact{display:flex;gap:10px;margin-top:10px}
  .contact a{flex:1;text-align:center;border-radius:10px;padding:9px;font-size:12.5px;font-weight:700;text-decoration:none}
  .wa{background:#25d366;color:#04240f}
  .mail{background:var(--panel2);color:#fff;border:1px solid var(--line)}
  .manage{display:flex;gap:8px;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);flex-wrap:wrap}
  .manage select,.manage input{background:#0e0e0e;border:1px solid var(--line);border-radius:9px;padding:9px;color:#fff;font-size:13px}
  .manage input{flex:1;min-width:120px}
  .manage .save{background:var(--green);color:#04240f;border:none;font-weight:800;cursor:pointer;padding:9px 14px;border-radius:9px}
  .empty{text-align:center;color:var(--muted);padding:40px 10px;font-size:14px}
</style>
</head>
<body>
<header>
  <img src="assets/img/logo-white.png" alt="DAVFOOR">
  <span class="badge">🔒 Pedidos</span>
  <button class="out" id="btnOut" onclick="logout()">Salir</button>
</header>

<div class="wrap">
  <div class="warn" id="cfgWarn" style="display:none"></div>

  <!-- LOGIN -->
  <div class="login" id="loginView" style="display:none">
    <img src="assets/img/logo-white.png" alt="DAVFOOR">
    <h1>Panel de pedidos</h1>
    <p>Ingresa con tu correo y contraseña.</p>
    <input id="email" type="email" placeholder="correo@ejemplo.com" autocomplete="username">
    <input id="pass" type="password" placeholder="Contraseña" autocomplete="current-password">
    <button onclick="login()">Entrar</button>
    <div class="err" id="loginErr"></div>
  </div>

  <!-- APP -->
  <div id="appView" style="display:none">
    <div class="toolbar" id="filters">
      <div class="fchip active" data-f="todos" onclick="setFiltro(this)">Todos</div>
      <div class="fchip" data-f="Nuevo" onclick="setFiltro(this)">🆕 Nuevos</div>
      <div class="fchip" data-f="En preparación" onclick="setFiltro(this)">📦 En preparación</div>
      <div class="fchip" data-f="Enviado" onclick="setFiltro(this)">🚚 Enviados</div>
      <div class="fchip" data-f="Entregado" onclick="setFiltro(this)">✅ Entregados</div>
    </div>
    <div class="subbar" id="subbar"></div>
    <div class="list" id="list"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-config.js"></script>
<script>
  const fmt = n => '$'+Number(n||0).toLocaleString('es-CO');
  let sb=null, pedidos=[], filtro='todos';

  // ¿Configuró Supabase?
  const cfgOk = (typeof SUPABASE_URL!=='undefined') && SUPABASE_URL.startsWith('https://') && !SUPABASE_URL.includes('TU-PROYECTO') && SUPABASE_ANON_KEY && !SUPABASE_ANON_KEY.includes('PEGA_AQUI');

  async function init(){
    if(!cfgOk){
      document.getElementById('cfgWarn').style.display='block';
      document.getElementById('cfgWarn').innerHTML='⚙️ <b>Falta conectar Supabase.</b> Abre el archivo <b>assets/supabase-config.js</b> y pega tu <b>Project URL</b> y tu <b>anon public key</b>. Luego recarga esta página.';
      return;
    }
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data:{ session } } = await sb.auth.getSession();
    session ? showApp() : showLogin();
  }
  function showLogin(){ document.getElementById('loginView').style.display='block'; document.getElementById('appView').style.display='none'; document.getElementById('btnOut').style.display='none'; }
  async function showApp(){ document.getElementById('loginView').style.display='none'; document.getElementById('appView').style.display='block'; document.getElementById('btnOut').style.display='block'; await loadPedidos(); }

  async function login(){
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('pass').value;
    document.getElementById('loginErr').textContent='';
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if(error){ document.getElementById('loginErr').textContent = 'No pudimos entrar: revisa correo y contraseña.'; return; }
    showApp();
  }
  async function logout(){ await sb.auth.signOut(); showLogin(); }

  async function loadPedidos(){
    const { data, error } = await sb.from('pedidos').select('*').order('creado',{ascending:false});
    if(error){ document.getElementById('list').innerHTML='<div class="empty">No pudimos cargar los pedidos. ¿Corriste el SQL en Supabase?</div>'; return; }
    pedidos = data||[]; render();
  }

  function setFiltro(el){ document.querySelectorAll('#filters .fchip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); filtro=el.dataset.f; render(); }

  function render(){
    const list = pedidos.filter(p=> filtro==='todos' || (p.estado||'Nuevo')===filtro);
    document.getElementById('subbar').textContent = `${list.length} pedido(s)`;
    const el=document.getElementById('list');
    if(!list.length){ el.innerHTML='<div class="empty">No hay pedidos en este filtro. 📭</div>'; return; }
    el.innerHTML = list.map(p=>{
      const items = (p.items||[]).map(i=>`<div>${i.cant||1}× ${i.team||i.nombre||'Producto'}${i.talla?' · Talla '+i.talla:''}${i.color?' · '+i.color:''} — ${fmt(i.precio)}</div>`).join('') || '<div>—</div>';
      const est=(p.estado||'Nuevo'); const estKey=est.replace(/\s/g,'');
      const pago=(p.pago||'pendiente');
      const fecha = p.creado ? new Date(p.creado).toLocaleString('es-CO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
      const cel=(p.celular||'').replace(/\D/g,'');
      return `<div class="order">
        <div class="o-top">
          <span class="o-id">Pedido #${p.id}</span>
          <span class="o-date">${fecha}</span>
          <span class="pill pay-${pago}">${pago==='pagado'?'✔ Pagado':(pago==='rechazado'?'✖ Rechazado':'⏳ Pendiente')}</span>
          <span class="pill st st-${estKey}">${est}</span>
        </div>
        <div class="o-row"><b>${p.cliente||'Cliente'}</b> · ${p.ciudad||''} ${p.departamento||''}</div>
        <div class="o-row">${p.direccion||''}</div>
        <div class="items">${items}</div>
        <div class="o-row">Método: <b>${p.metodo||'—'}</b> · Envío: ${fmt(p.envio)}</div>
        <div class="o-total">Total: ${fmt(p.total)}</div>
        <div class="contact">
          ${cel?`<a class="wa" href="https://wa.me/57${cel}" target="_blank">💬 WhatsApp</a>`:''}
          ${p.correo?`<a class="mail" href="mailto:${p.correo}">✉️ Correo</a>`:''}
        </div>
        <div class="manage">
          <select id="est-${p.id}">
            ${['Nuevo','En preparación','Enviado','Entregado'].map(s=>`<option ${s===est?'selected':''}>${s}</option>`).join('')}
          </select>
          <input id="guia-${p.id}" placeholder="N° de guía" value="${p.guia||''}">
          <button class="save" onclick="guardar(${p.id})">Guardar</button>
        </div>
      </div>`;
    }).join('');
  }

  async function guardar(id){
    const estado=document.getElementById('est-'+id).value;
    const guia=document.getElementById('guia-'+id).value.trim();
    const { error } = await sb.from('pedidos').update({estado, guia}).eq('id',id);
    if(error){ alert('No se pudo guardar. Intenta de nuevo.'); return; }
    const p=pedidos.find(x=>x.id===id); if(p){p.estado=estado;p.guia=guia;}
    render();
  }

  init();
</script>
</body>
</html>
